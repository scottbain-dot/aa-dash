<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1411" />
<title>League Cup — Athlete Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ============================================================
     LEAGUE CUP — courtside dashboard (display-only)
     Reads published Standings CSV from the Google Sheet.
     Fixtures + sports are computed client-side from the spec.
     ============================================================ */
  :root {
    --bg: #fef8f6;
    --bg-warm: #f5ebe5;
    --ink: #1a1411;
    --ink-soft: #3a2e28;
    --ink-mute: #7a6a60;
    --burgundy: #874B46;
    --burgundy-dark: #6b3a36;
    --gold: #D4AF37;
    --gold-soft: #e8c969;
    --cream: #faf3ed;
    --line: #e8d9cf;
    --line-strong: #d4c0b3;
    --shadow: 0 1px 3px rgba(26,20,17,0.05), 0 8px 24px rgba(26,20,17,0.06);
    --shadow-lift: 0 4px 12px rgba(26,20,17,0.08), 0 24px 48px rgba(26,20,17,0.10);

    /* Team palette — dominant visual identity */
    --t-red:    #d6342b;
    --t-yellow: #e0a91f;
    --t-green:  #2f9e54;
    --t-blue:   #2f6fd4;
    --t-maroon: #874B46;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
    font-size: 16px;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: env(safe-area-inset-bottom);
  }
  h1, h2, h3, .display { font-family: 'Fraunces', serif; letter-spacing: -0.02em; line-height: 1.1; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* ----- App shell ----- */
  .wrap { max-width: 640px; margin: 0 auto; min-height: 100vh; }

  /* ----- Header ----- */
  header {
    position: sticky; top: 0; z-index: 30;
    background: var(--ink);
    color: var(--cream);
    padding: calc(16px + env(safe-area-inset-top)) 18px 14px;
    box-shadow: 0 2px 16px rgba(26,20,17,0.18);
  }
  header .tag {
    font-size: 11px; font-weight: 700; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 4px;
  }
  header h1 {
    font-weight: 700; font-style: italic;
    font-size: clamp(30px, 9vw, 42px); color: var(--cream); line-height: 0.98;
  }
  header h1 em { font-style: normal; color: var(--gold); }

  /* ----- League toggle ----- */
  .league-toggle {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .league-toggle button {
    flex: 1; padding: 11px 8px; border-radius: 12px;
    background: rgba(250,243,237,0.10); color: rgba(250,243,237,0.65);
    font-weight: 700; font-size: 14px; letter-spacing: 0.02em;
    transition: all 0.18s ease; border: 1.5px solid transparent;
  }
  .league-toggle button.active {
    background: var(--gold); color: var(--ink);
    box-shadow: 0 4px 14px rgba(212,175,55,0.35);
  }

  /* ----- View tabs ----- */
  .view-tabs {
    display: flex; background: var(--bg-warm);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 20;
  }
  .view-tabs button {
    flex: 1; padding: 15px 8px; font-weight: 700; font-size: 15px;
    color: var(--ink-mute); position: relative; transition: color 0.15s;
  }
  .view-tabs button.active { color: var(--burgundy); }
  .view-tabs button.active::after {
    content: ''; position: absolute; left: 18%; right: 18%; bottom: 0;
    height: 3px; background: var(--burgundy); border-radius: 3px 3px 0 0;
  }

  main { padding: 18px 16px 40px; }

  /* ----- Section sub-head ----- */
  .sub {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px;
  }
  .sub h2 { font-size: 22px; font-weight: 600; color: var(--ink); }
  .sub .meta { font-size: 12px; color: var(--ink-mute); text-align: right; }
  .refresh {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--burgundy); color: #fff; font-weight: 700;
    font-size: 13px; padding: 9px 14px; border-radius: 999px;
    box-shadow: var(--shadow);
  }
  .refresh:active { transform: scale(0.96); }
  .refresh.spin svg { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ----- Leaderboard ----- */
  .board { display: flex; flex-direction: column; gap: 12px; }
  .row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center; gap: 14px;
    background: #fff; border-radius: 16px; padding: 16px 18px;
    box-shadow: var(--shadow);
    border-left: 10px solid var(--team);
    position: relative; overflow: hidden;
  }
  .row.lead {
    background: linear-gradient(100deg, #fff 60%, color-mix(in srgb, var(--team) 12%, #fff));
    box-shadow: var(--shadow-lift);
  }
  .row .rank {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 38px; color: var(--team); line-height: 1; text-align: center;
  }
  .row.lead .rank::after {
    content: '🏆'; display: block; font-size: 15px; margin-top: 2px;
  }
  .row .who { min-width: 0; }
  .row .team {
    font-weight: 800; font-size: 20px; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 9px;
  }
  .row .dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--team); flex: none;
    box-shadow: 0 0 0 2px #fff, 0 0 0 3px var(--team);
  }
  .row .played { font-size: 13px; color: var(--ink-mute); margin-top: 3px; }
  .row .pts { text-align: right; }
  .row .pts .n {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 34px; line-height: 1; color: var(--ink);
  }
  .row .pts .lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-mute);
  }

  /* ----- Fixtures ----- */
  .lesson-pick {
    display: flex; gap: 7px; margin-bottom: 18px; overflow-x: auto;
    padding-bottom: 4px; -webkit-overflow-scrolling: touch;
  }
  .lesson-pick button {
    flex: none; width: 56px; padding: 9px 0; border-radius: 12px;
    background: #fff; border: 1.5px solid var(--line); box-shadow: var(--shadow);
    font-weight: 700; color: var(--ink-mute); text-align: center; line-height: 1.15;
  }
  .lesson-pick button .ln { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; display: block; }
  .lesson-pick button .nn { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); }
  .lesson-pick button.active {
    background: var(--burgundy); border-color: var(--burgundy);
  }
  .lesson-pick button.active .nn,
  .lesson-pick button.active .ln { color: #fff; }

  .sport-banner {
    background: var(--ink); color: var(--cream);
    border-radius: 16px; padding: 18px 20px; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    box-shadow: var(--shadow-lift);
  }
  .sport-banner .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); }
  .sport-banner .sport { font-family: 'Fraunces', serif; font-weight: 700; font-size: 27px; margin-top: 2px; }
  .sport-banner .loc {
    font-size: 13px; font-weight: 700; padding: 7px 14px; border-radius: 999px;
    background: rgba(250,243,237,0.12); color: var(--cream); white-space: nowrap;
  }
  .sport-banner .loc.out { background: rgba(47,158,84,0.25); }

  .round-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute); margin: 16px 2px 9px;
  }
  .round-label:first-child { margin-top: 0; }

  .game {
    background: #fff; border-radius: 14px; padding: 14px 16px;
    box-shadow: var(--shadow); margin-bottom: 10px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px;
  }
  .game .side { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .game .side.b { flex-direction: row-reverse; text-align: right; }
  .game .side .chip {
    width: 30px; height: 30px; border-radius: 9px; flex: none;
    background: var(--team); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.25);
  }
  .game .side .nm { font-weight: 800; font-size: 17px; }
  .game .vs { font-family: 'Fraunces', serif; font-weight: 600; font-size: 14px; color: var(--ink-mute); }

  .ref-line {
    display: flex; align-items: center; gap: 8px; justify-content: center;
    margin-top: 2px; margin-bottom: 4px;
    font-size: 13px; color: var(--ink-soft);
  }
  .ref-line .whistle { font-size: 14px; }
  .ref-line .ref-chip {
    display: inline-flex; align-items: center; gap: 6px; font-weight: 700;
  }
  .ref-line .ref-chip .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--team); flex:none; }

  /* ----- States ----- */
  .state {
    text-align: center; padding: 48px 24px; color: var(--ink-mute);
  }
  .state .big { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink-soft); margin-bottom: 8px; }
  .state .hint { font-size: 14px; line-height: 1.6; }
  .state code {
    background: var(--bg-warm); padding: 2px 7px; border-radius: 6px;
    font-size: 12px; color: var(--burgundy-dark); word-break: break-all;
  }
  .skeleton {
    background: linear-gradient(100deg, #fff 30%, var(--bg-warm) 50%, #fff 70%);
    background-size: 200% 100%; animation: sk 1.2s infinite;
    border-radius: 16px; height: 84px; margin-bottom: 12px;
  }
  @keyframes sk { to { background-position: -200% 0; } }
  .err-banner {
    background: #fff3f1; border: 1px solid #f3c9c2; color: #9a3a2e;
    border-radius: 12px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px;
    line-height: 1.5;
  }

  footer { text-align: center; padding: 24px 16px 40px; color: var(--ink-mute); font-size: 12px; }
  footer .champs { font-family: 'Fraunces', serif; font-style: italic; color: var(--burgundy); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="tag">FIS Warriors · Athlete Academy</div>
    <h1>League <em>Cup</em></h1>
    <div class="league-toggle" id="leagueToggle">
      <button data-league="Performance" class="active">Performance</button>
      <button data-league="Recreational">Recreational</button>
    </div>
  </header>

  <nav class="view-tabs" id="viewTabs">
    <button data-view="board" class="active">Leaderboard</button>
    <button data-view="fixtures">Today's fixtures</button>
  </nav>

  <main id="main"><!-- rendered --></main>

  <footer>
    <div>5 lessons · 5 sports · double round-robin · win 3 · draw 1 · loss 0</div>
    <div class="champs" id="champLine"></div>
  </footer>
</div>

<script>
/* ============================================================
   CONFIG — published Standings CSV (one per league)
   Sheet → File → Share → Publish to web → Standings tab → CSV.
   Paste each URL below. Leave as '' until published; the
   leaderboard then shows a friendly setup message.
   ============================================================ */
const STANDINGS_CSV = {
  Performance:  '',
  Recreational: ''
};

/* ---- Team palette (matches CSS custom props) ---- */
const TEAMS = ['Red', 'Yellow', 'Green', 'Blue', 'Maroon'];
const TEAM_COLOR = {
  Red: 'var(--t-red)', Yellow: 'var(--t-yellow)', Green: 'var(--t-green)',
  Blue: 'var(--t-blue)', Maroon: 'var(--t-maroon)'
};

/* ---- Sports per lesson per league (spec §4) ---- */
const SPORTS = {
  Performance: {
    1: { sport: 'Soccer',           loc: 'Out' },
    2: { sport: 'Basketball',       loc: 'In'  },
    3: { sport: 'Volleyball',       loc: 'In'  },
    4: { sport: 'Capture the Flag', loc: 'Out' },
    5: { sport: 'Benchball',        loc: 'In'  }
  },
  Recreational: {
    1: { sport: 'Benchball',        loc: 'In'  },
    2: { sport: 'Handball',         loc: 'Out' },
    3: { sport: 'Kickball',         loc: 'Out' },
    4: { sport: 'Volleyball',       loc: 'In'  },
    5: { sport: 'Capture the Flag', loc: 'Out' }
  }
};

/* ---- Master fixture pattern (spec §3) — identical for both leagues ----
   Each lesson has 2 rounds; each round = 2 games + 1 ref team. */
const FIXTURES = {
  1: {
    1: { games: [['Red','Yellow'], ['Green','Blue']],   ref: 'Maroon' },
    2: { games: [['Red','Blue'],   ['Green','Maroon']], ref: 'Yellow' }
  },
  2: {
    1: { games: [['Yellow','Green'], ['Blue','Maroon']], ref: 'Red'   },
    2: { games: [['Red','Blue'],     ['Yellow','Maroon']], ref: 'Green' }
  },
  3: {
    1: { games: [['Red','Maroon'], ['Green','Blue']],     ref: 'Yellow' },
    2: { games: [['Red','Green'],  ['Yellow','Maroon']],  ref: 'Blue'   }
  },
  4: {
    1: { games: [['Red','Yellow'], ['Blue','Maroon']],   ref: 'Green'  },
    2: { games: [['Red','Green'],  ['Yellow','Blue']],   ref: 'Maroon' }
  },
  5: {
    1: { games: [['Red','Maroon'],  ['Yellow','Green']], ref: 'Blue'   },
    2: { games: [['Yellow','Blue'], ['Green','Maroon']], ref: 'Red'    }
  }
};

/* ============================================================ */
const state = {
  league: 'Performance',
  view: 'board',
  lesson: 1,
  standings: { Performance: null, Recreational: null }, // null = not loaded
  loading: false,
  error: { Performance: null, Recreational: null }
};

const $main = document.getElementById('main');

/* ---------- League + view toggles ---------- */
document.getElementById('leagueToggle').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state.league = b.dataset.league;
  document.querySelectorAll('#leagueToggle button').forEach(x => x.classList.toggle('active', x === b));
  render();
  if (state.view === 'board' && !state.standings[state.league]) loadStandings(state.league);
});
document.getElementById('viewTabs').addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  state.view = b.dataset.view;
  document.querySelectorAll('#viewTabs button').forEach(x => x.classList.toggle('active', x === b));
  render();
  if (state.view === 'board' && !state.standings[state.league]) loadStandings(state.league);
});

/* ---------- Data: fetch + parse published Standings CSV ----------
   Display-only: the sheet has already computed Played/Points/Rank.
   We just locate the five colour rows regardless of header layout. */
function loadStandings(league, force) {
  const url = STANDINGS_CSV[league];
  if (!url) { state.standings[league] = []; render(); return; }
  if (state.loading) return;
  state.loading = true;
  state.error[league] = null;
  setRefreshSpin(true);
  // cache-bust so a refresh after an edit isn't served a stale copy
  const bust = (url.includes('?') ? '&' : '?') + '_=' + Date.now();
  Papa.parse(url + bust, {
    download: true,
    complete: (res) => {
      state.loading = false; setRefreshSpin(false);
      try {
        state.standings[league] = parseStandings(res.data);
      } catch (err) {
        state.standings[league] = [];
        state.error[league] = 'Could not read the standings sheet.';
      }
      render();
    },
    error: () => {
      state.loading = false; setRefreshSpin(false);
      state.standings[league] = [];
      state.error[league] = 'Could not reach the standings sheet. Check the published link and your connection.';
      render();
    }
  });
}

function num(v) { const n = parseFloat(String(v).replace(/[^0-9.\-]/g, '')); return isNaN(n) ? 0 : n; }

function parseStandings(rows) {
  // rows: array of arrays. Find rows whose first cell is one of the five colours.
  const out = [];
  (rows || []).forEach(r => {
    if (!r || !r.length) return;
    const team = String(r[0]).trim();
    const canon = TEAMS.find(t => t.toLowerCase() === team.toLowerCase());
    if (!canon) return;
    out.push({
      team: canon,
      played: num(r[1]),
      points: num(r[2]),
      rank:   r[3] != null && String(r[3]).trim() !== '' ? num(r[3]) : null
    });
  });
  // Sort by points desc; if sheet supplied ranks, that order matches anyway.
  out.sort((a, b) => b.points - a.points || a.team.localeCompare(b.team));
  return out;
}

/* ---------- Render ---------- */
function render() {
  if (state.view === 'board') renderBoard();
  else renderFixtures();
  renderChampLine();
}

function setRefreshSpin(on) {
  const r = document.querySelector('.refresh');
  if (r) r.classList.toggle('spin', on);
}

function refreshIcon() {
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0 0 20.5 15"/></svg>';
}

function renderBoard() {
  const data = state.standings[state.league];
  const err = state.error[state.league];
  const head = `
    <div class="sub">
      <h2>${state.league}</h2>
      <button class="refresh" onclick="loadStandings('${state.league}', true)">${refreshIcon()} Refresh</button>
    </div>`;

  // Not loaded yet
  if (data === null && !state.loading) { loadStandings(state.league); }
  if (data === null) {
    $main.innerHTML = head + '<div class="skeleton"></div>'.repeat(5);
    return;
  }

  // No URL configured
  if (!STANDINGS_CSV[state.league]) {
    $main.innerHTML = head + `
      <div class="state">
        <div class="big">Standings not connected yet</div>
        <div class="hint">
          Publish the <strong>Standings_${state.league}</strong> tab to the web as CSV, then paste the link into
          <code>STANDINGS_CSV.${state.league}</code> near the top of this file.<br><br>
          Fixtures already work — tap <strong>Today's fixtures</strong>.
        </div>
      </div>`;
    return;
  }

  let body = '';
  if (err) body += `<div class="err-banner">${err}</div>`;

  if (!data.length) {
    body += `
      <div class="state">
        <div class="big">No results in yet</div>
        <div class="hint">Once a teacher types scores into the sheet, standings appear here within a minute or two. Pull to refresh.</div>
      </div>`;
    $main.innerHTML = head + body;
    return;
  }

  const leadPts = data[0].points;
  body += '<div class="board">';
  data.forEach((s, i) => {
    const isLead = s.points === leadPts && leadPts > 0;
    body += `
      <div class="row${isLead ? ' lead' : ''}" style="--team:${TEAM_COLOR[s.team]}">
        <div class="rank">${i + 1}</div>
        <div class="who">
          <div class="team"><span class="dot"></span>${s.team}</div>
          <div class="played">${s.played} game${s.played === 1 ? '' : 's'} played</div>
        </div>
        <div class="pts"><div class="n">${s.points}</div><div class="lbl">pts</div></div>
      </div>`;
  });
  body += '</div>';
  $main.innerHTML = head + body;
}

function renderFixtures() {
  const L = state.lesson;
  const info = SPORTS[state.league][L];

  let html = `
    <div class="sub"><h2>Today's fixtures</h2></div>
    <div class="lesson-pick">`;
  for (let n = 1; n <= 5; n++) {
    html += `
      <button class="${n === L ? 'active' : ''}" onclick="pickLesson(${n})">
        <span class="ln">L</span><span class="nn">${n}</span>
      </button>`;
  }
  html += `</div>`;

  html += `
    <div class="sport-banner">
      <div>
        <div class="lbl">Lesson ${L} · ${state.league}</div>
        <div class="sport">${info.sport}</div>
      </div>
      <div class="loc ${info.loc.toLowerCase()}">${info.loc === 'Out' ? '🌳 Outside' : '🏠 Inside'}</div>
    </div>`;

  [1, 2].forEach(rd => {
    const r = FIXTURES[L][rd];
    html += `<div class="round-label">Round ${rd}</div>`;
    r.games.forEach(g => html += gameCard(g[0], g[1]));
    html += `
      <div class="ref-line">
        <span class="whistle">🟡</span> Referee:
        <span class="ref-chip"><span class="dot" style="background:${TEAM_COLOR[r.ref]}"></span>${r.ref}</span>
      </div>`;
  });

  $main.innerHTML = html;
}

function gameCard(a, b) {
  return `
    <div class="game">
      <div class="side a">
        <span class="chip" style="--team:${TEAM_COLOR[a]}"></span>
        <span class="nm">${a}</span>
      </div>
      <span class="vs">v</span>
      <div class="side b">
        <span class="chip" style="--team:${TEAM_COLOR[b]}"></span>
        <span class="nm">${b}</span>
      </div>
    </div>`;
}

function pickLesson(n) { state.lesson = n; render(); }

function renderChampLine() {
  const data = state.standings[state.league];
  const el = document.getElementById('champLine');
  if (!data || !data.length) { el.textContent = ''; return; }
  // Lead is meaningful only once lesson 5 is done (8 games each).
  const allDone = data.every(s => s.played >= 8);
  if (allDone && data[0].points > (data[1] ? data[1].points : 0)) {
    el.textContent = `🏆 ${state.league} champions: ${data[0].team}`;
  } else if (data[0].points > 0) {
    el.textContent = `Leading ${state.league}: ${data[0].team}`;
  } else {
    el.textContent = '';
  }
}

/* ---------- Boot ---------- */
render();
loadStandings('Performance');
</script>
</body>
</html>
